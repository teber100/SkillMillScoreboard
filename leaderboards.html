<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaderboards</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <nav class="top-nav" aria-label="Site navigation">
        <a href="index.html">Home</a>
        <a href="submit.html">Submit</a>
        <a href="leaderboards.html">Leaderboards</a>
        <a href="hall.html">Hall of Champions</a>
        <a href="player.html">Player Profiles</a>
        <a href="tv.html">TV Display</a>
      </nav>
      <section class="card">
        <h1>Overall Standings</h1>
        <label class="small subtle" style="display:inline-flex; gap:0.45rem; align-items:center; margin-bottom:0.75rem;">
          <input id="tieBreakerToggle" type="checkbox" />
          Show tie-breaker details
        </label>
        <p id="participantsNote" class="small subtle"></p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>Player</th>
                <th>Total Points</th>
                <th data-tiebreaker-column hidden>1st</th>
                <th data-tiebreaker-column hidden>2nd</th>
                <th data-tiebreaker-column hidden>3rd</th>
              </tr>
            </thead>
            <tbody id="overallBody"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <h2>Per-Game Leaderboards</h2>
        <div id="gameBoards" class="grid"></div>
      </section>
    </main>

    <script src="app.js"></script>
    <script>
      const store = window.TournamentStore;
      const TIE_BREAKER_PREF_KEY = "skillmill_show_tie_breaker_details_v1";

      function readTieBreakerPreference() {
        return localStorage.getItem(TIE_BREAKER_PREF_KEY) === "true";
      }

      function saveTieBreakerPreference(value) {
        localStorage.setItem(TIE_BREAKER_PREF_KEY, value ? "true" : "false");
      }

      function updateTieBreakerColumnsVisibility(showDetails) {
        document.querySelectorAll("[data-tiebreaker-column]").forEach((el) => {
          el.hidden = !showDetails;
        });
      }

      async function renderPage(showTieBreakerDetails) {
        const state = await store.loadState();
        const currentTournament = store.getCurrentTournamentFromState(state);
        if (!currentTournament) {
          document.getElementById("overallBody").innerHTML =
            '<tr><td colspan="6">No active tournament is configured. Ask an admin to create/select one.</td></tr>';
          const participantsNote = document.getElementById("participantsNote");
          if (participantsNote) participantsNote.textContent = "";
          document.getElementById("gameBoards").innerHTML = "";
          return;
        }

        const overall = store.getRankedOverallRows(store.getOverallStandings(state));
        const overallBody = document.getElementById("overallBody");
        const participantsNote = document.getElementById("participantsNote");
        if (participantsNote) {
          participantsNote.textContent = `Showing ${overall.length} participant${overall.length === 1 ? "" : "s"}`;
        }
        overallBody.innerHTML = "";
        overall.forEach((row) => {
          const tr = document.createElement("tr");
          const tieBreakerCells = showTieBreakerDetails
            ? `<td data-tiebreaker-column>${row.firstPlaceFinishes}</td><td data-tiebreaker-column>${row.secondPlaceFinishes}</td><td data-tiebreaker-column>${row.thirdPlaceFinishes}</td>`
            : "";
          tr.innerHTML = `<td>${row.rank}</td><td>${row.player}</td><td>${row.points}</td>${tieBreakerCells}`;
          overallBody.appendChild(tr);
        });

        const bestByGame = store.getBestScoresByGame(state);
        const gameBoards = document.getElementById("gameBoards");
        gameBoards.innerHTML = "";

        store.getActiveGames(state).forEach((game) => {
          const wrapped = document.createElement("div");
          wrapped.className = "card";
          const rows = store.calculateGamePoints(bestByGame[game.id] || []);
          const body = rows.length
            ? rows
                .map(
                  (row) =>
                    `<tr><td>${row.rank}</td><td>${row.playerName}</td><td>${row.score}</td><td>${row.points}</td></tr>`
                )
                .join("")
            : '<tr><td colspan="4" class="subtle">No scores yet.</td></tr>';

          wrapped.innerHTML = `
            <h3>${store.escapeHtml(game.name)}</h3>
            <p class="small subtle">${
              game.direction === "higher" ? "Higher score wins" : "Lower score wins"
            } • Expected range: ${game.min} to ${game.max}</p>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr><th>Rank</th><th>Player</th><th>Best Score</th><th>Points</th></tr>
                </thead>
                <tbody>${body}</tbody>
              </table>
            </div>
          `;
          gameBoards.appendChild(wrapped);
        });
      }

      (async () => {
        await store.initializeStore();
        const connection = store.getConnectionStatus();
        const tieBreakerToggle = document.getElementById("tieBreakerToggle");
        let showTieBreakerDetails = readTieBreakerPreference();
        tieBreakerToggle.checked = showTieBreakerDetails;
        updateTieBreakerColumnsVisibility(showTieBreakerDetails);
        tieBreakerToggle.addEventListener("change", async () => {
          showTieBreakerDetails = tieBreakerToggle.checked;
          saveTieBreakerPreference(showTieBreakerDetails);
          updateTieBreakerColumnsVisibility(showTieBreakerDetails);
          await renderPage(showTieBreakerDetails);
        });
        if (!connection.available) {
          document.getElementById("overallBody").innerHTML = `<tr><td colspan="6">${store.escapeHtml(
            connection.message
          )}</td></tr>`;
          return;
        }
        await renderPage(showTieBreakerDetails);
      })();
    </script>
  </body>
</html>
