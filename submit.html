<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submit Score</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <nav class="top-nav" aria-label="Site navigation">
        <a href="index.html">Home</a>
        <a href="submit.html">Submit</a>
        <a href="leaderboards.html">Leaderboards</a>
        <a href="tv.html">TV Display</a>
      </nav>
      <section class="card">
        <h1>Submit Score</h1>
        <p class="subtle">Pick your player name and game from the approved lists.</p>

        <form id="scoreForm" class="grid">
          <div>
            <label for="playerSelect">Player</label>
            <select id="playerSelect" required></select>
            <button id="clearRememberedPlayerBtn" class="link-button small" type="button">
              Clear remembered player
            </button>
          </div>
          <div>
            <label for="gameSelect">Game</label>
            <select id="gameSelect" required></select>
          </div>
          <div>
            <label for="scoreInput">Score</label>
            <input id="scoreInput" type="number" step="any" required />
          </div>
          <label class="checkbox-row">
            <input id="rememberPlayerInput" type="checkbox" checked />
            Remember me on this device
          </label>
          <button type="submit">Submit Score</button>
        </form>
        <p id="status" class="status"></p>
      </section>
    </main>

    <div id="rangeModal" class="modal-backdrop" role="dialog" aria-modal="true">
      <div class="card modal">
        <h3>Score is outside expected range</h3>
        <p id="rangeText"></p>
        <div class="inline">
          <button id="fixBtn" class="secondary" type="button">Fix it</button>
          <button id="submitAnywayBtn" type="button">Submit anyway</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
    <script>
      const store = window.TournamentStore;
      const playerSelect = document.getElementById("playerSelect");
      const gameSelect = document.getElementById("gameSelect");
      const form = document.getElementById("scoreForm");
      const scoreInput = document.getElementById("scoreInput");
      const status = document.getElementById("status");
      const rememberPlayerInput = document.getElementById("rememberPlayerInput");
      const clearRememberedPlayerBtn = document.getElementById("clearRememberedPlayerBtn");
      const LAST_PLAYER_STORAGE_KEY = "last_player_id";
      let state = null;

      function fillSelect(select, values) {
        select.innerHTML = "";
        const placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "-- Select --";
        placeholder.disabled = true;
        placeholder.selected = true;
        select.appendChild(placeholder);

        values.forEach((value) => {
          const option = document.createElement("option");
          option.value = value.value;
          option.textContent = value.label;
          select.appendChild(option);
        });
      }

      async function refreshState() {
        state = await store.loadState();
        fillSelect(
          playerSelect,
          state.players.map((p) => ({ value: String(p.id), label: p.name }))
        );
        fillSelect(
          gameSelect,
          state.games.map((g) => ({ value: String(g.id), label: g.name }))
        );

        const rememberedPlayerId = localStorage.getItem(LAST_PLAYER_STORAGE_KEY);
        if (rememberedPlayerId) {
          const rememberedPlayerExists = state.players.some(
            (player) => String(player.id) === String(rememberedPlayerId)
          );

          if (rememberedPlayerExists) {
            playerSelect.value = rememberedPlayerId;
          } else {
            localStorage.removeItem(LAST_PLAYER_STORAGE_KEY);
          }
        }

        if (!state.players.length || !state.games.length) {
          status.textContent = "Admin must add players and games before scoring can begin.";
          status.className = "status warn";
        }
      }

      async function saveSubmission(force = false) {
        const playerId = playerSelect.value;
        const gameId = gameSelect.value;
        const score = Number(scoreInput.value);
        const game = state.games.find((g) => String(g.id) === String(gameId));
        if (!playerId || !gameId || Number.isNaN(score) || !game) return;

        if (!force && (score < game.min || score > game.max)) {
          const modal = document.getElementById("rangeModal");
          document.getElementById(
            "rangeText"
          ).textContent = `Expected range for ${game.name} is ${game.min} to ${game.max}.`;
          modal.classList.add("show");
          document.getElementById("fixBtn").onclick = () => modal.classList.remove("show");
          document.getElementById("submitAnywayBtn").onclick = async () => {
            modal.classList.remove("show");
            await saveSubmission(true);
          };
          return;
        }

        await store.submitScore({ playerId, gameId, score, submittedByAdmin: false });
        const shouldRememberPlayer = rememberPlayerInput.checked;
        if (shouldRememberPlayer) {
          localStorage.setItem(LAST_PLAYER_STORAGE_KEY, String(playerId));
        } else {
          localStorage.removeItem(LAST_PLAYER_STORAGE_KEY);
        }

        status.textContent = "Score submitted successfully.";
        status.className = "status ok";
        const selectedPlayerId = playerSelect.value;
        form.reset();
        if (shouldRememberPlayer && selectedPlayerId) {
          playerSelect.value = selectedPlayerId;
        }
      }

      clearRememberedPlayerBtn.addEventListener("click", () => {
        localStorage.removeItem(LAST_PLAYER_STORAGE_KEY);
        playerSelect.selectedIndex = 0;
        status.textContent = "Remembered player cleared.";
        status.className = "status";
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          await saveSubmission(false);
        } catch (error) {
          status.textContent = "Could not submit score. Please try again.";
          status.className = "status warn";
          console.error(error);
        }
      });

      (async () => {
        await store.initializeStore();
        const connection = store.getConnectionStatus();
        if (!connection.available) {
          form.querySelectorAll("input, select, button").forEach((el) => (el.disabled = true));
          status.textContent = connection.message;
          status.className = "status warn";
          return;
        }
        await refreshState();
      })();
    </script>
  </body>
</html>
