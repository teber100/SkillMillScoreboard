name: Supabase Heartbeat

on:
  schedule:
    # Twice a week (Mon + Thu). Adjust if you want.
    - cron: "17 14 * * 1,4"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -e

          # Pick a small public table that always exists in your app.
          # This should return quickly and reliably.
          ENDPOINT="$SUPABASE_URL/rest/v1/games?select=id&limit=1"

          echo "Pinging: $ENDPOINT"

          HTTP_STATUS=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Accept: application/json" \
            "$ENDPOINT")

          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/resp.json

          # Fail the job if not 200 OK
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Heartbeat failed (status $HTTP_STATUS)"
            exit 1
          fi

          echo "Heartbeat succeeded."
